name: Publish llbase Images

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "tools/llbase/**"
      - ".github/workflows/publish-llbase-images.yml"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - family: latest
            dockerfile: tools/llbase/docker/Dockerfile
          - family: mid
            dockerfile: tools/llbase/docker/Dockerfile.mid
          - family: legacy
            dockerfile: tools/llbase/docker/Dockerfile.legacy
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push llbase image
        uses: docker/build-push-action@v6
        with:
          context: ./tools/llbase
          file: ./${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/llbase:${{ matrix.family }}
            ghcr.io/${{ github.repository_owner }}/llbase:${{ github.sha }}-${{ matrix.family }}
