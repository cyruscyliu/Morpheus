workspace:
  root: ./hyperarm-workspace

remote:
  ssh: debian@mcc96e5308801.dyn.epfl.ch
  workspace:
    root: /home/debian/hyperarm-workspace2

tools:
  buildroot:
    mode: remote
    sync-morpheus: true
    cli-contract: fetch,patch,build
    build-version: 2025.02.12
    reuse-build-dir: true
    build-dir-key: arm64-dev
    patch-dir: tools/buildroot/patches
    defconfig: qemu_aarch64_virt_defconfig
    make-args:
      - -j$(nproc)
    config-fragment:
      - BR2_LINUX_KERNEL=y
      - BR2_LINUX_KERNEL_CUSTOM_VERSION=y
      - BR2_LINUX_KERNEL_CUSTOM_VERSION_VALUE="6.18.16"
      - BR2_TOOLCHAIN_BUILDROOT_GLIBC=y
      - BR2_TARGET_GENERIC_GETTY=y
      - BR2_TARGET_GENERIC_GETTY_PORT="console"
      - BR2_TARGET_ROOTFS_CPIO=y
      - BR2_TARGET_ROOTFS_CPIO_GZIP=y
      - BR2_ROOTFS_POST_IMAGE_SCRIPT=""
      - BR2_ROOTFS_POST_SCRIPT_ARGS=""
      - BR2_PACKAGE_PCIUTILS=y
      - BR2_PACKAGE_DROPBEAR=y
      - BR2_TARGET_GENERIC_ROOT_PASSWD="root"
    artifacts:
      - images/Image
      - images/rootfs.cpio.gz
  qemu:
    mode: remote
    sync-morpheus: true
    cli-contract: fetch,patch,build,exec
    build-version: 8.2.7
    reuse-build-dir: true
    build-dir-key: qemu-8.2.7-aarch64-softmmu
    patch-dir: tools/qemu/patches
    target-list:
      - aarch64-softmmu
    artifacts:
      - qemu-system-aarch64
  microkit-sdk:
    mode: local
    cli-contract: fetch,patch,build
    reuse-build-dir: true
    build-dir-key: microkit-sdk-2.1.0
    microkit-archive-url: https://github.com/seL4/microkit/archive/119044f9573674342cedb9694142cce7b832d2ff.tar.gz
    toolchain-version: 12.3.rel1
    patch-dir: tools/microkit-sdk/patches
    boards: qemu_virt_aarch64
    configs: debug,release
    artifacts:
      - sdk-dir
      - toolchain-dir
  llbic:
    mode: remote
    sync-morpheus: true
    cli-contract: exec
    arch: arm64
    clang: 15
    out-of-tree: true
    sources: tools/llbic/src
    output: tools/llbic/builds
    conf: tools/llbic/sources.conf
    artifacts:
      - source-dir
      - output-dir
      - llbic-json
      - bitcode-files
      - llbic-log
      - kernel-build-log
  llcg:
    mode: local
    sync-morpheus: true
    cli-contract: exec
    arch: arm64
    clang: 15
    reuse-build-dir: true
    build-dir-key: arm64-clang15
    output: tools/llcg/builds
    artifacts:
      - output-dir
      - manifest
      - mutator_manifest
      - source_dir
      - source_list
      - groups_file
      - llbic_json
      - all_bc_list
      - bitcode_list
      - kallgraph_text
      - cg_dot
      - cg_collapsed_dot
      - cg_svg
      - cg_pdf
      - cg_collapsed_svg
      - cg_collapsed_pdf
      - log_file
  libvmm:
    mode: local
    cli-contract: fetch,patch,build,exec
    reuse-build-dir: true
    build-dir-key: libvmm-2fd1d64d
    git-ref: 2fd1d64d7805ad1647af6e2a832e4671d0d40297
    board: qemu_virt_aarch64
    example: virtio
    patch-dir: tools/libvmm/patches
    dependencies:
      microkit-sdk:
        tool: microkit-sdk
        artifact: sdk-dir
      toolchain-bin-dir:
        tool: microkit-sdk
        artifact: toolchain-dir
    artifacts:
      - libvmm-dir
      - example-dir
      - example-build-dir
      - runtime-contract
  sel4:
    mode: local
    cli-contract: fetch,patch,build
    build-version: c0fc32450fb5e8460083b89a84d067249b109cfc
    reuse-build-dir: true
    build-dir-key: sel4-c0fc3245
    archive-url: https://github.com/seL4/seL4/archive/c0fc32450fb5e8460083b89a84d067249b109cfc.tar.gz
    patch-dir: tools/sel4/patches/fuzz-sel4
    artifacts:
      - source-dir
  nvirsh:
    mode: local
    cli-contract: exec
    target: sel4
    name: sel4-dev
    board: qemu_virt_aarch64
    microkit-config: debug
    runtime:
      provider:
        tool: libvmm
        artifact: runtime-contract
      action: qemu
    dependencies:
      qemu:
        tool: qemu
        artifact: qemu-system-aarch64
      microkit-sdk:
        tool: microkit-sdk
        artifact: sdk-dir
      toolchain-bin-dir:
        tool: microkit-sdk
        artifact: toolchain-dir
      libvmm-dir:
        tool: libvmm
        artifact: libvmm-dir
      kernel:
        tool: buildroot
        artifact: images/Image
      initrd:
        tool: buildroot
        artifact: images/rootfs.cpio.gz

workflows:
  build-buildroot:
    category: build
    steps:
      - id: buildroot_fetch
        tool: buildroot
        command: fetch
      - id: buildroot_patch
        tool: buildroot
        command: patch
        args:
          - --source
          - "{{steps.buildroot_fetch.artifacts.source-dir.location}}"
          - --patch-dir
          - "{{workspace.root}}/tools/buildroot/patches"
      - id: buildroot
        tool: buildroot
        command: build
        args:
          - --source
          - "{{steps.buildroot_patch.artifacts.source-dir.location}}"
  build-qemu:
    category: build
