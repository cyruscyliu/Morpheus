# Example Morpheus workspace config.
#
# Copy this file to `morpheus.yaml` and adjust the paths or SSH target for your
# machine.

workspace:
  root: ./hyperarm-workspace

# Uncomment this block to let `morpheus workspace create` and
# `morpheus workspace show` manage both a local workspace and a remote
# workspace from one config.
# remote:
#   ssh: user@example.com
#   workspace:
#     root: /home/user/hyperarm-workspace

tools:
  buildroot:
    mode: remote
    buildroot-version: 2025.02.12
    reuse-build-dir: true
    build-dir-key: arm64-dev
    patch-dir: ./hyperarm-workspace/tools/buildroot/patches
    defconfig: qemu_aarch64_virt_defconfig
    make-args:
      - -j$(nproc)
    config-fragment:
      - BR2_LINUX_KERNEL=y
      - BR2_LINUX_KERNEL_CUSTOM_VERSION=y
      - BR2_LINUX_KERNEL_CUSTOM_VERSION_VALUE="6.18.16"
      - BR2_TOOLCHAIN_BUILDROOT_GLIBC=y
      - BR2_TARGET_GENERIC_GETTY=y
      - BR2_TARGET_GENERIC_GETTY_PORT="ttyAMA0"
      - BR2_TARGET_ROOTFS_CPIO=y
      - BR2_TARGET_ROOTFS_CPIO_GZIP=y
      - BR2_PACKAGE_PCIUTILS=y
    artifacts:
      - images/Image
      - images/rootfs.cpio.gz
  qemu:
    mode: local
    qemu-version: 8.2.7
    reuse-build-dir: true
    build-dir-key: qemu-8.2.7-aarch64-softmmu
    target-list:
      - aarch64-softmmu
    artifacts:
      - qemu-system-aarch64
  microkit-sdk:
    mode: local
    microkit-version: 2.0.1
    reuse-build-dir: true
    build-dir-key: microkit-sdk-2.0.1
    # archive-url: file:///tmp/microkit-sdk-2.0.1.tar.gz
    # microkit-archive-url: https://github.com/seL4/microkit/archive/refs/tags/2.0.1.tar.gz
    # microkit-dir: ./deps/microkit
    artifacts:
      - sdk-dir
  sel4:
    mode: local
    sel4-version: 15.0.0
    reuse-build-dir: true
    build-dir-key: sel4-15.0.0
    artifacts:
      - source-dir
  nvirsh:
    mode: local
    target: sel4
    name: sel4-dev
    microkit-version: 1.4.1
    toolchain: ./deps/arm-gnu-toolchain
    libvmm-dir: ./deps/libvmm
    sel4-version: 15.0.0
    append: console=ttyAMA0
    qemu-args:
      - -machine
      - virt,virtualization=on,gic-version=3
      - -cpu
      - cortex-a57
      - -smp
      - "4"
      - -m
      - "2048"
      - -nographic
    dependencies:
      qemu:
        tool: qemu
        artifact: qemu-system-aarch64
      microkit-sdk:
        tool: microkit-sdk
        artifact: sdk-dir
      kernel:
        tool: buildroot
        artifact: images/Image
      initrd:
        tool: buildroot
        artifact: images/rootfs.cpio.gz
      sel4:
        tool: sel4
        artifact: source-dir
