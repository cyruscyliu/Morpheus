        command: patch
        args:
          - --source
          - "{{steps.microkit_sdk_fetch.artifacts.source-dir.location}}"
      - id: microkit_sdk_build
        tool: microkit-sdk
        command: build
        args:
          - --source
          - "{{steps.microkit_sdk_patch.artifacts.source-dir.location}}"
          - --sel4
          - "{{steps.sel4_patch.artifacts.source-dir.location}}"
      - id: libvmm_fetch
        tool: libvmm
        command: fetch
      - id: libvmm_patch
        tool: libvmm
        command: patch
        args:
          - --source
          - "{{steps.libvmm_fetch.artifacts.libvmm-dir.location}}"
      - id: libvmm_build
        tool: libvmm
        command: build
        args:
          - --source
          - "{{steps.libvmm_patch.artifacts.libvmm-dir.location}}"
      - id: libvmm_exec
        tool: libvmm
        command: exec
        args:
          - --runtime-contract
          - "{{steps.libvmm_build.artifacts.runtime-contract.location}}"
          - --libvmm-dir
          - "{{steps.libvmm_build.artifacts.libvmm-dir.location}}"
          - --microkit-sdk
          - "{{steps.microkit_sdk_build.artifacts.sdk-dir.location}}"
          - --board
          - qemu_virt_aarch64
          - --microkit-config
          - debug
          - --qemu
          - "{{steps.qemu_build.artifacts.qemu-system-aarch64.location}}"
          - --toolchain-bin-dir
          - "{{steps.microkit_sdk_build.artifacts.toolchain-dir.location}}/bin"
          - --kernel
          - "{{steps.buildroot_build.artifacts.Image.location}}"
          - --initrd
          - "{{steps.buildroot_build.artifacts.rootfs-cpio-gz.location}}"
          - --detach
