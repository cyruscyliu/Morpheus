workspace:
  root: ./workspace
cache:
  root: ../../.cache
  namespace: hyperarm
  downloads: global
  builds: global
  src: global

tools:
  buildroot:
    mode: local
    build-version: 2025.02.12
    reuse-build-dir: true
    build-dir-key: arm64-dev
    patch-dir: tools/buildroot/patches
    defconfig: qemu_aarch64_virt_defconfig
    config-fragment:
      - BR2_GLOBAL_PATCH_DIR="$(CONFIG_DIR)/../../../patches"
      - BR2_LINUX_KERNEL=y
      - BR2_LINUX_KERNEL_CUSTOM_VERSION=y
      - BR2_LINUX_KERNEL_CUSTOM_VERSION_VALUE="6.18.16"
      - BR2_LINUX_KERNEL_CONFIG_FRAGMENT_FILES="$(CONFIG_DIR)/../../../patches/linux/kernel.fragment"
      - BR2_TAR_OPTIONS="--no-same-owner"
      - BR2_TOOLCHAIN_BUILDROOT_GLIBC=y
      - BR2_TARGET_GENERIC_GETTY=y
      - BR2_TARGET_GENERIC_GETTY_PORT="console"
      - BR2_TARGET_ROOTFS_CPIO=y
      - BR2_TARGET_ROOTFS_CPIO_GZIP=y
      - BR2_ROOTFS_POST_IMAGE_SCRIPT=""
      - BR2_ROOTFS_POST_SCRIPT_ARGS=""
      - BR2_PACKAGE_PCIUTILS=y
      - BR2_PACKAGE_DROPBEAR=y
      - BR2_TARGET_GENERIC_ROOT_PASSWD="root"
    artifacts:
      - images-dir
      - images/Image
      - images/rootfs.cpio.gz
      - build/vmlinux
  qemu:
    mode: local
    build-version: 8.2.7
    reuse-build-dir: true
    build-dir-key: qemu-8.2.7-aarch64-softmmu
    patch-dir: tools/qemu/patches
    target-list:
      - aarch64-softmmu
    configure-arg:
      - --disable-docs
      - --disable-tools
      - --disable-cap-ng
      - --disable-curses
      - --disable-virtfs
      - --disable-guest-agent
      - --disable-guest-agent-msi
    artifacts:
      - qemu-system-aarch64
  libafl:
    mode: local
    reuse-build-dir: true
    build-dir-key: libafl-main
    build-version: b32557c8ae7e2300657de06382f2761f831c1963
    git-url: https://github.com/AFLplusplus/LibAFL.git
    patch-dir: tools/libafl/patches/overlay
    patch-script: ./workspace/tools/libafl/scripts/qemu_nesting/patch.sh
    build-script: ./workspace/tools/libafl/scripts/qemu_nesting/build.sh
    inspect-script: ./workspace/tools/libafl/scripts/qemu_nesting/inspect.sh
    harness-script: ./workspace/tools/libafl/scripts/qemu_nesting/exec.sh
    artifacts:
      - source-dir
      - crate-dir
      - qemu-bridge-dir
      - qemu-bridge-lib
      - guest-stub-binary
  nvirsh:
    mode: local
    source: ../../tools/nvirsh/profiles/qemu-debian-arm
    profile: qemu-debian-arm64
    build-dir-key: qemu-debian-arm64
    reuse-build-dir: true
    dependencies:
      qemu:
        tool: qemu
        artifact: qemu-system-aarch64
      firmware:
        tool: qemu
        artifact: edk2-aarch64-code
      buildroot:
        tool: buildroot
        artifact: output-dir
  microkit-sdk:
    mode: local
    reuse-build-dir: true
    build-dir-key: microkit-sdk-2.1.0
    microkit-archive-url: https://github.com/seL4/microkit/archive/119044f9573674342cedb9694142cce7b832d2ff.tar.gz
    toolchain-version: 12.3.rel1
    toolchain-archive-url: https://developer.arm.com/-/media/Files/downloads/gnu/12.3.rel1/binrel/arm-gnu-toolchain-12.3.rel1-x86_64-aarch64-none-elf.tar.xz?rev=28d5199f6db34e5980aae1062e5a6703&hash=F6F5604BC1A2BBAAEAC4F6E98D8DC35B
    patch-dir: tools/microkit-sdk/patches
    boards: qemu_virt_aarch64
    configs: debug,release
    dependencies:
      sel4:
        tool: sel4
        artifact: source-dir
    artifacts:
      - sdk-dir
      - source-dir
      - toolchain-dir
  nqc2:
    mode: local
    build-version: dev
    reuse-build-dir: true
    build-dir-key: default
    seed-dir: ../../tools/nqc2/scripts
  llbase:
    mode: local
    source: ../../tools/llbase
    build-dir-key: latest
    family: latest
    pull-image: true
    build-image: false
    artifacts:
      - source-dir
      - output-dir
      - runtime-helper
      - runtime-contract
  llbic:
    mode: local
    arch: arm64
    clang: 15
    out-of-tree: true
    build-dir-key: 6.18.16-arm64-clang15
    source: tools/llbic/sources
    conf: tools/llbic/sources.conf
    dependencies:
      llbase:
        tool: llbase
        artifact: runtime-contract
    artifacts:
      - sources-root
      - source-dir
      - output-dir
      - llbic-json
      - bitcode-files
      - llbic-log
      - kernel-build-log
  llcg:
    mode: local
    sync-morpheus: true
    arch: arm64
    clang: 15
    reuse-build-dir: true
    build-dir-key: arm64-clang15
    dependencies:
      llbase:
        tool: llbase
        artifact: runtime-contract
      llbic:
        tool: llbic
        artifact: llbic-json
      llbic-bitcode:
        tool: llbic
        artifact: bitcode-files
    artifacts:
      - output-dir
      - manifest
      - mutator_manifest
      - source_dir
      - source_list
      - groups_file
      - llbic_json
      - all_bc_list
      - bitcode_list
      - kallgraph_text
      - cg_dot
      - cg_collapsed_dot
      - cg_svg
      - cg_pdf
      - cg_collapsed_svg
      - cg_collapsed_pdf
      - log_file
  pkvm-aarch64:
    mode: local
    reuse-build-dir: true
    build-dir-key: pkvm-aarch64-main
    git-url: https://github.com/vrosendahl/pkvm-aarch64.git
  libvmm:
    mode: local
    reuse-build-dir: true
    build-dir-key: libvmm-2fd1d64d
    git-ref: 2fd1d64d7805ad1647af6e2a832e4671d0d40297
    git-url: https://github.com/au-ts/libvmm.git
    board: qemu_virt_aarch64
    example: virtio
    patch-dir: tools/libvmm/patches
    dependencies:
      microkit-sdk:
        tool: microkit-sdk
        artifact: sdk-dir
      toolchain-bin-dir:
        tool: microkit-sdk
        artifact: toolchain-dir
    artifacts:
      - libvmm-dir
      - example-dir
      - example-build-dir
      - runtime-contract
  sel4:
    mode: local
    build-version: c0fc32450fb5e8460083b89a84d067249b109cfc
    reuse-build-dir: true
    build-dir-key: sel4-c0fc3245
    archive-url: https://github.com/seL4/seL4/archive/c0fc32450fb5e8460083b89a84d067249b109cfc.tar.gz
    patch-dir: tools/sel4/patches/fuzz-sel4
    artifacts:
      - source-dir
workflows:
  llbase-build:
    category: build
    steps:
      - id: llbase_build
        tool: llbase
        command: build
  llbic-build:
    category: build
    steps:
      - id: llbase_build
        tool: llbase
        command: build
      - id: llbic_build
        tool: llbic
        command: build
        args:
          - --llbase-contract
          - "{{steps.llbase_build.artifacts.runtime-contract.location}}"
          - --build-version
          - "6.18.16"
  llcg-build:
    category: build
    steps:
      - id: llbase_build
        tool: llbase
        command: build
      - id: llbic_build
        tool: llbic
        command: build
        args:
          - --llbase-contract
          - "{{steps.llbase_build.artifacts.runtime-contract.location}}"
          - --build-version
          - "6.18.16"
      - id: llcg_build
        tool: llcg
        command: build
        args:
          - --llbase-contract
          - "{{steps.llbase_build.artifacts.runtime-contract.location}}"
      - id: llcg_mutator
        tool: llcg
        command: exec
        args:
          - --llbase-contract
          - "{{steps.llbase_build.artifacts.runtime-contract.location}}"
          - --source-dir
          - "{{steps.llbic_build.artifacts.source-dir.location}}"
          - --generator
          - files
          - --file
          - arch/x86/kernel/cpu/common.c
          - --scope-name
          - linux-6.18.16-x86-cpu-common
      - id: llcg_run
        tool: llcg
        command: exec
        args:
          - --llbase-contract
          - "{{steps.llbase_build.artifacts.runtime-contract.location}}"
          - --llbic-json
          - "{{steps.llbic_build.artifacts.llbic-json.location}}"
          - --all-bc-list
          - "{{steps.llbic_build.artifacts.bitcode-files.location}}"
          - --filter
          - "{{steps.llcg_mutator.artifacts.mutator_manifest.location}}"
  buildroot-build:
    category: build
    steps:
      - id: buildroot_fetch
        tool: buildroot
        command: fetch
      - id: buildroot_patch
        tool: buildroot
        command: patch
        args:
          - --source
          - "{{steps.buildroot_fetch.artifacts.source-dir.location}}"
      - id: buildroot_build
        tool: buildroot
        command: build
        args:
          - --source
          - "{{steps.buildroot_patch.artifacts.source-dir.location}}"
  qemu-build:
    category: build
    steps:
      - id: qemu_fetch
        tool: qemu
        command: fetch
      - id: qemu_patch
        tool: qemu
        command: patch
        args:
          - --source
          - "{{steps.qemu_fetch.artifacts.source-dir.location}}"
      - id: qemu_build
        tool: qemu
        command: build
        args:
          - --source
          - "{{steps.qemu_patch.artifacts.source-dir.location}}"
  libafl-build:
    category: build
    steps:
      - id: libafl_fetch
        tool: libafl
        command: fetch
      - id: libafl_patch
        tool: libafl
        command: patch
        args:
          - --source
          - "{{steps.libafl_fetch.artifacts.source-dir.location}}"
      - id: libafl_build
        tool: libafl
        command: build
        args:
          - --source
          - "{{steps.libafl_patch.artifacts.source-dir.location}}"
  nvirsh-arm64-build:
    category: build
    steps:
      - id: buildroot_fetch
        tool: buildroot
        command: fetch
      - id: buildroot_patch
        tool: buildroot
        command: patch
        args:
          - --source
          - "{{steps.buildroot_fetch.artifacts.source-dir.location}}"
      - id: buildroot_build
        tool: buildroot
        command: build
        args:
          - --source
          - "{{steps.buildroot_patch.artifacts.source-dir.location}}"
      - id: qemu_fetch
        tool: qemu
        command: fetch
      - id: qemu_patch
        tool: qemu
        command: patch
        args:
          - --source
          - "{{steps.qemu_fetch.artifacts.source-dir.location}}"
      - id: qemu_build
        tool: qemu
        command: build
        args:
          - --source
          - "{{steps.qemu_patch.artifacts.source-dir.location}}"
      - id: nvirsh_fetch
        tool: nvirsh
        command: fetch
      - id: nvirsh_build
        tool: nvirsh
        command: build
        args:
          - --qemu
          - "{{steps.qemu_build.artifacts.qemu-system-aarch64.location}}"
          - --buildroot-output-dir
          - "{{steps.buildroot_build.artifacts.output-dir.location}}"
          - --guest-qemu-source
          - "{{steps.qemu_patch.artifacts.source-dir.location}}"
  nqc2-build:
    category: build
    steps:
      - id: qemu_fetch
        tool: qemu
        command: fetch
      - id: qemu_patch
        tool: qemu
        command: patch
        args:
          - --source
          - "{{steps.qemu_fetch.artifacts.source-dir.location}}"
      - id: qemu_build
        tool: qemu
        command: build
        args:
          - --source
          - "{{steps.qemu_patch.artifacts.source-dir.location}}"
      - id: nqc2_fetch
        tool: nqc2
        command: fetch
      - id: nqc2_build
        tool: nqc2
        command: build
        args:
          - --source
          - "{{steps.nqc2_fetch.artifacts.source-dir.location}}"
          - --qemu
          - "{{steps.qemu_build.artifacts.qemu-system-aarch64.location}}"
  microkit-sdk-build:
    category: build
    steps:
      - id: sel4_fetch
        tool: sel4
