      - id: pkvm_build_guest2host
        tool: pkvm-aarch64
        command: build
        args:
          - --source
          - "{{steps.pkvm_fetch.artifacts.source-dir.location}}"
          - --build-target
          - guest2host
          - --qemu
          - "{{steps.qemu_build.artifacts.qemu-system-aarch64.location}}"
