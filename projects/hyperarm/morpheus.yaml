workspace:
  root: ./workspace
cache:
  root: ~/.cache/morpheus
  namespace: hyperarm
  downloads: global
  builds: global
  src: global

imports:
  workflows:
    - root.buildroot-build
    - root.qemu-build
    - root.microkit-sdk-build
    - root.nqc2-build
    - root.libvmm-build
    - root.sel4-build

tools:
  buildroot:
    mode: local
    build-version: 2025.02.12
    reuse-build-dir: true
    build-dir-key: arm64-dev
    patch-dir: tools/buildroot/patches
    defconfig: qemu_aarch64_virt_defconfig
    make-args:
      - -j4
    config-fragment:
      - BR2_LINUX_KERNEL=y
      - BR2_LINUX_KERNEL_CUSTOM_VERSION=y
      - BR2_LINUX_KERNEL_CUSTOM_VERSION_VALUE="6.18.16"
      - BR2_LINUX_KERNEL_CONFIG_FRAGMENT_FILES="$(CONFIG_DIR)/../../../patches/linux/kernel.fragment"
      - BR2_TOOLCHAIN_BUILDROOT_GLIBC=y
      - BR2_TARGET_GENERIC_GETTY=y
      - BR2_TARGET_GENERIC_GETTY_PORT="console"
      - BR2_TARGET_ROOTFS_CPIO=y
      - BR2_TARGET_ROOTFS_CPIO_GZIP=y
      - BR2_ROOTFS_POST_IMAGE_SCRIPT=""
      - BR2_ROOTFS_POST_SCRIPT_ARGS=""
      - BR2_PACKAGE_PCIUTILS=y
      - BR2_PACKAGE_DROPBEAR=y
      - BR2_TARGET_GENERIC_ROOT_PASSWD="root"
    artifacts:
      - images/Image
      - images/rootfs.cpio.gz
      - build/vmlinux
  qemu:
    mode: local
    build-version: 8.2.7
    reuse-build-dir: true
    build-dir-key: qemu-8.2.7-aarch64-softmmu
    patch-dir: tools/qemu/patches
    target-list:
      - aarch64-softmmu
    artifacts:
      - qemu-system-aarch64
  microkit-sdk:
    mode: local
    reuse-build-dir: true
    build-dir-key: microkit-sdk-2.1.0
    microkit-archive-url: https://github.com/seL4/microkit/archive/119044f9573674342cedb9694142cce7b832d2ff.tar.gz
    toolchain-version: 12.3.rel1
    toolchain-archive-url: https://developer.arm.com/-/media/Files/downloads/gnu/12.3.rel1/binrel/arm-gnu-toolchain-12.3.rel1-x86_64-aarch64-none-elf.tar.xz?rev=28d5199f6db34e5980aae1062e5a6703&hash=F6F5604BC1A2BBAAEAC4F6E98D8DC35B
    patch-dir: tools/microkit-sdk/patches
    boards: qemu_virt_aarch64
    configs: debug,release
    dependencies:
      sel4:
        tool: sel4
        artifact: source-dir
    artifacts:
      - sdk-dir
      - source-dir
      - toolchain-dir
  nqc2:
    mode: local
    build-version: dev
    reuse-build-dir: true
    build-dir-key: default
  llbic:
    mode: remote
    sync-morpheus: true
    cli-contract: exec
    arch: arm64
    clang: 15
    out-of-tree: true
    sources: tools/llbic/src
    output: tools/llbic/builds
    conf: tools/llbic/sources.conf
    artifacts:
      - source-dir
      - output-dir
      - llbic-json
      - bitcode-files
      - llbic-log
      - kernel-build-log
  llcg:
    mode: local
    sync-morpheus: true
    cli-contract: exec
    arch: arm64
    clang: 15
    reuse-build-dir: true
    build-dir-key: arm64-clang15
    output: tools/llcg/builds
    artifacts:
      - output-dir
      - manifest
      - mutator_manifest
      - source_dir
      - source_list
      - groups_file
      - llbic_json
      - all_bc_list
      - bitcode_list
      - kallgraph_text
      - cg_dot
      - cg_collapsed_dot
      - cg_svg
      - cg_pdf
      - cg_collapsed_svg
      - cg_collapsed_pdf
      - log_file
  libvmm:
    mode: local
    reuse-build-dir: true
    build-dir-key: libvmm-2fd1d64d
    git-ref: 2fd1d64d7805ad1647af6e2a832e4671d0d40297
    git-url: https://github.com/au-ts/libvmm.git
    board: qemu_virt_aarch64
    example: virtio
    patch-dir: tools/libvmm/patches
    dependencies:
      microkit-sdk:
        tool: microkit-sdk
        artifact: sdk-dir
      toolchain-bin-dir:
        tool: microkit-sdk
        artifact: toolchain-dir
    artifacts:
      - libvmm-dir
      - example-dir
      - example-build-dir
      - runtime-contract
  sel4:
    mode: local
    build-version: c0fc32450fb5e8460083b89a84d067249b109cfc
    reuse-build-dir: true
    build-dir-key: sel4-c0fc3245
    archive-url: https://github.com/seL4/seL4/archive/c0fc32450fb5e8460083b89a84d067249b109cfc.tar.gz
    patch-dir: tools/sel4/patches/fuzz-sel4
    artifacts:
      - source-dir
workflows:
  buildroot-qemu-runtime:
    category: run
    steps:
      - id: buildroot_fetch
        tool: buildroot
        command: fetch
      - id: buildroot_patch
        tool: buildroot
        command: patch
        args:
          - --source
          - "{{steps.buildroot_fetch.artifacts.source-dir.location}}"
      - id: buildroot_build
        tool: buildroot
        command: build
        args:
          - --source
          - "{{steps.buildroot_patch.artifacts.source-dir.location}}"
      - id: qemu_fetch
        tool: qemu
        command: fetch
      - id: qemu_patch
        tool: qemu
        command: patch
        args:
          - --source
          - "{{steps.qemu_fetch.artifacts.source-dir.location}}"
      - id: qemu_build
        tool: qemu
        command: build
        args:
          - --source
          - "{{steps.qemu_patch.artifacts.source-dir.location}}"
      - id: qemu_exec
        tool: qemu
        command: exec
        args:
          - --mode
          - local
          - --path
          - "{{steps.qemu_build.artifacts.qemu-system-aarch64.location}}"
          - --kernel
          - "{{steps.buildroot_build.artifacts.Image.location}}"
          - --initrd
          - "{{steps.buildroot_build.artifacts.rootfs-cpio-gz.location}}"
          - --detach
  buildroot-qemu-runtime-nqc2:
    category: run
    steps:
      - id: buildroot_fetch
        tool: buildroot
        command: fetch
      - id: buildroot_patch
        tool: buildroot
        command: patch
        args:
          - --source
          - "{{steps.buildroot_fetch.artifacts.source-dir.location}}"
      - id: buildroot_build
        tool: buildroot
        command: build
        args:
          - --source
          - "{{steps.buildroot_patch.artifacts.source-dir.location}}"
      - id: qemu_fetch
        tool: qemu
        command: fetch
      - id: qemu_patch
        tool: qemu
        command: patch
        args:
          - --source
          - "{{steps.qemu_fetch.artifacts.source-dir.location}}"
      - id: qemu_build
        tool: qemu
        command: build
        args:
          - --source
          - "{{steps.qemu_patch.artifacts.source-dir.location}}"
      - id: nqc2_fetch
        tool: nqc2
        command: fetch
      - id: nqc2_build
        tool: nqc2
        command: build
        args:
          - --source
          - "{{steps.nqc2_fetch.artifacts.source-dir.location}}"
          - --qemu
          - "{{steps.qemu_build.artifacts.qemu-system-aarch64.location}}"
      - id: qemu_exec
        tool: qemu
        command: exec
        args:
          - --mode
          - local
          - --path
          - "{{steps.qemu_build.artifacts.qemu-system-aarch64.location}}"
          - --kernel
          - "{{steps.buildroot_build.artifacts.Image.location}}"
          - --initrd
          - "{{steps.buildroot_build.artifacts.rootfs-cpio-gz.location}}"
          - --qemu-arg
          - -plugin
          - --qemu-arg
          - "{{steps.nqc2_build.artifacts.nqc2-plugin-so.location}},trace=runti\
            me/buildroot-qemu-runtime-nqc2.trace"
          - --timeout-seconds
          - "20"
          - --detach
      - id: nqc2_postprocess
        tool: nqc2
        command: postprocess
        args:
          - --install-dir
          - "{{steps.nqc2_build.artifacts.install-dir.location}}"
          - --trace
          - "{{steps.qemu_exec.details.run_dir}}/buildroot-qemu-runtime-nqc2.tr\
            ace"
          - --elf
          - "{{steps.buildroot_build.artifacts.vmlinux.location}}"
          - --trace-output
          - none
          - --coverage-output
          - "{{steps.qemu_exec.details.run_dir}}/buildroot-qemu-runtime-nqc2.in\
            fo"
          - --coverage-format
          - lcov
          - --jobs
          - "4"
          - --wait-seconds
          - "10"
      - id: nqc2_genhtml
        tool: nqc2
        command: genhtml
        args:
          - --install-dir
          - "{{steps.nqc2_build.artifacts.install-dir.location}}"
          - --coverage-output
          - "{{steps.qemu_exec.details.run_dir}}/buildroot-qemu-runtime-nqc2.in\
            fo"
          - --output
          - "{{steps.qemu_exec.details.run_dir}}/html"
          - --title
          - Hyperarm NQC2 Coverage
      - id: qemu_stop
        tool: qemu
        command: stop
        args:
          - --run-dir
          - "{{steps.qemu_exec.details.run_dir}}"
  buildroot-libvmm-runtime:
    category: run
