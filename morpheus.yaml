workspace:
  root: ./workspace
tools:
  buildroot:
    seed-dir: ./tools/buildroot/fixtures/minimal-buildroot
    patch-dir: ./tools/buildroot/patches/demo
  libvmm:
    seed-dir: ./tools/libvmm/fixtures/minimal-libvmm-src
    patch-dir: ./tools/libvmm/patches/demo
    example: virtio
  microkit-sdk:
    seed-dir: ./tools/microkit-sdk/fixtures/minimal-microkit-sdk-src
    patch-dir: ./tools/microkit-sdk/patches/demo
    toolchain-version: fixture
    toolchain-prefix-aarch64: aarch64-none-elf
  qemu:
    seed-dir: ./tools/qemu/fixtures/minimal-qemu-src
    patch-dir: ./tools/qemu/patches/demo
  sel4:
    seed-dir: ./tools/sel4/fixtures/minimal-sel4-src
    patch-dir: ./tools/sel4/patches/demo
workflows:
  buildroot-build:
    category: build
    steps:
      - id: buildroot_fetch
        tool: buildroot
        command: fetch
      - id: buildroot_patch
        tool: buildroot
        command: patch
        args:
          - --source
          - "{{steps.buildroot_fetch.artifacts.source-dir.location}}"
      - id: buildroot
        tool: buildroot
        command: build
        args:
          - --source
          - "{{steps.buildroot_patch.artifacts.source-dir.location}}"
  qemu-build:
    category: build
    steps:
      - id: qemu_fetch
        tool: qemu
        command: fetch
      - id: qemu_patch
        tool: qemu
        command: patch
        args:
          - --source
          - "{{steps.qemu_fetch.artifacts.source-dir.location}}"
      - id: qemu_build
        tool: qemu
        command: build
        args:
          - --source
          - "{{steps.qemu_patch.artifacts.source-dir.location}}"
  microkit-sdk-build:
    category: build
    steps:
      - id: sel4_fetch
        tool: sel4
        command: fetch
      - id: sel4_patch
        tool: sel4
        command: patch
        args:
          - --source
          - "{{steps.sel4_fetch.artifacts.source-dir.location}}"
      - id: microkit_sdk_fetch
        tool: microkit-sdk
        command: fetch
      - id: microkit_sdk_patch
        tool: microkit-sdk
        command: patch
        args:
          - --source
          - "{{steps.microkit_sdk_fetch.artifacts.source-dir.location}}"
      - id: microkit_sdk_build
        tool: microkit-sdk
        command: build
        args:
          - --source
          - "{{steps.microkit_sdk_patch.artifacts.source-dir.location}}"
          - --sel4
          - "{{steps.sel4_patch.artifacts.source-dir.location}}"
  libvmm-build:
    category: build
    steps:
      - id: libvmm_fetch
        tool: libvmm
        command: fetch
      - id: libvmm_patch
        tool: libvmm
        command: patch
        args:
          - --source
          - "{{steps.libvmm_fetch.artifacts.libvmm-dir.location}}"
      - id: libvmm_build
        tool: libvmm
        command: build
        args:
          - --source
          - "{{steps.libvmm_patch.artifacts.libvmm-dir.location}}"
  sel4-build:
    category: build
    steps:
      - id: sel4_fetch
        tool: sel4
        command: fetch
      - id: sel4_patch
        tool: sel4
        command: patch
        args:
          - --source
          - "{{steps.sel4_fetch.artifacts.source-dir.location}}"
      - id: sel4_build
        tool: sel4
        command: build
        args:
          - --source
          - "{{steps.sel4_patch.artifacts.source-dir.location}}"
  libvmm-build-ci:
    category: build
    steps:
      - id: sel4_fetch
        tool: sel4
        command: fetch
        args:
          - --build-version
          - fixture
      - id: sel4_patch
        tool: sel4
        command: patch
        args:
          - --path
          - "{{steps.sel4_fetch.artifacts.source-dir.location}}"
      - id: microkit_sdk_fetch
        tool: microkit-sdk
        command: fetch
        args:
          - --build-version
          - fixture
      - id: microkit_sdk_patch
        tool: microkit-sdk
        command: patch
        args:
          - --path
          - "{{steps.microkit_sdk_fetch.artifacts.source-dir.location}}"
      - id: microkit_sdk_build
        tool: microkit-sdk
        command: build
        args:
          - --path
          - "{{steps.microkit_sdk_patch.artifacts.source-dir.location}}"
          - --sel4
          - "{{steps.sel4_patch.artifacts.source-dir.location}}"
          - --boards
          - qemu_virt_aarch64
          - --configs
          - debug
      - id: libvmm_fetch
        tool: libvmm
        command: fetch
      - id: libvmm_patch
        tool: libvmm
        command: patch
        args:
          - --source
          - "{{steps.libvmm_fetch.artifacts.libvmm-dir.location}}"
      - id: libvmm_build
        tool: libvmm
        command: build
        args:
          - --source
          - "{{steps.libvmm_patch.artifacts.libvmm-dir.location}}"
          - --microkit-sdk
          - "{{steps.microkit_sdk_build.artifacts.sdk-dir.location}}"
          - --toolchain-bin-dir
          - "{{steps.microkit_sdk_build.artifacts.toolchain-dir.location}}/bin"
  microkit-sdk-build-ci:
    category: build
    steps:
      - id: sel4_fetch
        tool: sel4
        command: fetch
        args:
          - --build-version
          - fixture
      - id: sel4_patch
        tool: sel4
        command: patch
        args:
          - --path
          - "{{steps.sel4_fetch.artifacts.source-dir.location}}"
      - id: microkit_sdk_fetch
        tool: microkit-sdk
        command: fetch
        args:
          - --build-version
          - fixture
      - id: microkit_sdk_patch
        tool: microkit-sdk
        command: patch
        args:
          - --path
          - "{{steps.microkit_sdk_fetch.artifacts.source-dir.location}}"
      - id: microkit_sdk_build
        tool: microkit-sdk
        command: build
        args:
          - --path
          - "{{steps.microkit_sdk_patch.artifacts.source-dir.location}}"
          - --sel4
          - "{{steps.sel4_patch.artifacts.source-dir.location}}"
          - --boards
          - qemu_virt_aarch64
          - --configs
          - debug,release
  sel4-build-ci:
    category: build
    steps:
      - id: sel4_fetch
        tool: sel4
        command: fetch
        args:
          - --build-version
          - fixture
      - id: sel4_patch
        tool: sel4
        command: patch
        args:
          - --path
          - "{{steps.sel4_fetch.artifacts.source-dir.location}}"
      - id: sel4_build
        tool: sel4
        command: build
        args:
          - --path
          - "{{steps.sel4_patch.artifacts.source-dir.location}}"
  buildroot-build-ci:
    category: build
    steps:
      - id: buildroot_fetch
        tool: buildroot
        command: fetch
        args:
          - --build-version
          - fixture
      - id: buildroot_patch
        tool: buildroot
        command: patch
        args:
          - --source
          - "{{steps.buildroot_fetch.artifacts.source-dir.location}}"
      - id: buildroot_build
        tool: buildroot
        command: build
        args:
          - --source
          - "{{steps.buildroot_patch.artifacts.source-dir.location}}"
          - --build-dir-key
          - default
          - --defconfig
          - qemu_aarch64_virt_defconfig
  qemu-build-ci:
    category: build
    steps:
      - id: qemu_fetch
        tool: qemu
        command: fetch
        args:
          - --build-version
          - fixture
      - id: qemu_patch
        tool: qemu
        command: patch
        args:
          - --source
          - "{{steps.qemu_fetch.artifacts.source-dir.location}}"
      - id: qemu_build
        tool: qemu
        command: build
        args:
          - --source
          - "{{steps.qemu_patch.artifacts.source-dir.location}}"
          - --build-dir-key
          - default
          - --target-list
          - aarch64-softmmu
