<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Morpheus Runs Viewer</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="workspace">
      <header class="topbar">
        <div class="topbar-title">
          <strong>Morpheus</strong>
          <span class="topbar-subtitle">Runs Viewer</span>
        </div>
        <div class="topbar-actions">
          <div class="topbar-updated">
            <span class="meta-label">Updated</span>
            <span id="updated-at">-</span>
          </div>
          <button id="refresh-button" type="button" class="button">Refresh</button>
        </div>
      </header>

      <main class="workspace-main">
        <button
          id="toggle-runs-pane-floating"
          type="button"
          class="button small floating-toggle"
          aria-expanded="true"
          aria-controls="runs-list"
          hidden
        >
          Show runs
        </button>

        <section class="pane list-pane">
          <div class="pane-header">
            <div>
              <div class="pane-title">Runs</div>
              <p id="runs-summary" class="pane-subtitle"></p>
            </div>
            <div class="pane-actions">
              <button
                id="toggle-runs-pane"
                type="button"
                class="button small"
                aria-expanded="true"
                aria-controls="runs-list"
              >
                Collapse
              </button>
            </div>
            <div class="filters">
              <label class="field inline">
                <span class="field-label">Status</span>
                <select id="status-filter" aria-label="Status filter">
                  <option value="">All</option>
                  <option value="success">success</option>
                  <option value="failure">failure</option>
                  <option value="error">error</option>
                  <option value="running">running</option>
                  <option value="unknown">unknown</option>
                </select>
              </label>
            </div>
          </div>
          <div id="runs-list" class="entry-list" aria-live="polite"></div>
          <p id="empty-state" class="empty-state" hidden>No runs match.</p>
        </section>

        <div class="pane-spacer" aria-hidden="true"></div>

        <section class="pane detail-pane">
          <div class="pane-header">
            <div class="pane-title">Run</div>
            <div id="run-path" class="pane-path">Select a run</div>
          </div>
          <div id="run-detail" class="detail-scroll">
            <p class="empty-state">Select a run to inspect steps and logs.</p>
          </div>
        </section>

        <div
          class="pane-resizer"
          data-resizer="right"
          role="separator"
          aria-orientation="vertical"
          aria-label="Resize panes"
          tabindex="0"
        ></div>

        <section class="pane log-pane">
          <div class="pane-header">
            <div class="pane-title">Log</div>
            <div id="log-path" class="pane-path">Select a step</div>
            <div class="log-actions">
              <button id="log-jsonl" type="button" class="button small" aria-pressed="true">Events</button>
              <button id="log-beautify" type="button" class="button small" aria-pressed="true">Beautify</button>
              <button id="log-wrap" type="button" class="button small">Wrap</button>
              <button id="log-copy" type="button" class="button small">Copy</button>
            </div>
          </div>
          <div id="log-detail" class="detail-scroll">
            <p class="empty-state">Select a step to view its log.</p>
          </div>
        </section>
      </main>

    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
