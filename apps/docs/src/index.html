<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Morpheus</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="workspace">
      <header class="topbar">
        <div class="topbar-title">
          <strong>Morpheus</strong>
        </div>
        <div class="topbar-actions">
          <label class="theme-picker">
            <span class="sr-only">Theme</span>
            <select id="theme-select" aria-label="Theme"></select>
          </label>
          <div class="topbar-meta">North Star Systems Security Lab (NS3L)</div>
        </div>
      </header>

      <main class="workspace-main">
        <aside class="pane sidebar-pane">
          <div class="pane-title">Sections</div>
          <nav id="section-nav" class="nav-list" aria-label="Catalog sections"></nav>
        </aside>

        <section class="pane list-pane">
          <div class="pane-header">
            <div>
              <div class="pane-title">Catalog</div>
              <p id="catalog-summary" class="pane-subtitle"></p>
            </div>
          </div>
          <div id="catalog-list" class="entry-list" aria-live="polite"></div>
          <p id="empty-state" class="empty-state" hidden>No catalog entries match the current section.</p>
        </section>

        <section class="pane readme-pane">
          <div class="pane-header">
            <div class="pane-title">README</div>
            <div id="readme-path" class="pane-path">Select an entry</div>
          </div>
          <div id="catalog-detail" class="readme-scroll">
            <p class="empty-state">Select a tool or workflow to inspect its role in Morpheus.</p>
          </div>
        </section>
      </main>

      <footer class="statusbar">
        <div id="status-left">ready</div>
        <div id="status-right">workspace: apps/docs</div>
      </footer>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
